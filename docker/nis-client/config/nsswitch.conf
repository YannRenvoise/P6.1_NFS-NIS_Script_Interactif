# =============================================================================
# NSSwitch Configuration - Name Service Switch
# =============================================================================
# Definit l'ordre de recherche pour les bases de donnees utilisateurs.
# NIS est consulte apres les fichiers locaux (/etc/passwd, etc.)
# =============================================================================

# passwd: consulter d'abord files locaux, puis NIS
passwd:         files nis

# group: consulter d'abord files locaux, puis NIS
group:          files nis

# shadow: consulter d'abord files locaux (NIS peut ne pas avoir shadow)
shadow:         files

# hosts: DNS puis files
hosts:          files dns

# networks: files
networks:       files

# protocols: files
protocols:      files

# services: files
services:       files

# ethers: files
ethers:         files

# rpc: files
rpc:            files

# netgroup: NIS (NIS uniquement)
netgroup:       nis